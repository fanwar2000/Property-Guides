<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Property Guide</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
:root { --blue:#0088BB; --blue-dark:#005F88; --blue-deeper:#003F5C; --blue-light:#E6F6FC; --blue-mid:#B3DFF0; --accent:#FFD422; --white:#FFFFFF; --ink:#0D1F2D; --ink-soft:#3A5568; --border:#D6EDF7; --bg:#F4FAFD; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; }
body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--ink); -webkit-font-smoothing: antialiased; }
.header { background: var(--blue-deeper); position: relative; overflow: hidden; }
.header::before { content:''; position:absolute; width:500px; height:500px; border-radius:50%; background:rgba(0,140,190,0.18); top:-200px; right:-100px; pointer-events:none; }
.header::after { content:''; position:absolute; width:300px; height:300px; border-radius:50%; background:rgba(255,212,34,0.07); bottom:-120px; left:-60px; pointer-events:none; }
.header-inner { position:relative; max-width:680px; margin:0 auto; padding:48px 28px 40px; }
.header-logo { margin-bottom:22px; }
.header-logo img { height:38px; width:auto; display:block; mix-blend-mode:screen; filter:brightness(1.05); }
.header-welcome { font-size:11px; font-weight:500; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.4); margin-bottom:6px; }
.header-address { font-size:clamp(1.3rem,4.5vw,1.85rem); font-weight:800; color:var(--white); line-height:1.15; letter-spacing:-0.01em; margin-bottom:4px; word-break:break-word; }
.header-city { font-size:0.85rem; font-weight:400; color:rgba(255,255,255,0.45); margin-bottom:32px; letter-spacing:0.03em; }
.nav-chips { display:flex; flex-wrap:wrap; gap:8px; }
.nav-chips a { font-size:10.5px; font-weight:600; letter-spacing:0.05em; text-transform:uppercase; text-decoration:none; color:rgba(255,255,255,0.7); background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.13); border-radius:6px; padding:7px 12px; transition:all 0.18s ease; }
.nav-chips a:hover { background:var(--accent); color:var(--ink); border-color:var(--accent); }
.header-stripe { height:3px; background:linear-gradient(90deg,var(--blue) 0%,var(--blue-mid) 55%,transparent 100%); }
.content { max-width:680px; margin:0 auto; padding:24px 20px 80px; }
.card { background:var(--white); border-radius:12px; margin-bottom:8px; border:1px solid var(--border); overflow:hidden; transition:box-shadow 0.2s,border-color 0.2s; }
.card:hover { box-shadow:0 4px 18px rgba(0,100,160,0.09); border-color:var(--blue-mid); }
.card-header { display:flex; align-items:center; gap:13px; padding:16px 18px; cursor:pointer; user-select:none; }
.card-icon { width:38px; height:38px; border-radius:9px; background:var(--blue-light); display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0; transition:background 0.2s; }
.card.open .card-icon { background:var(--blue); }
.card-text { flex:1; min-width:0; }
.card-category { font-size:9px; font-weight:700; letter-spacing:0.15em; text-transform:uppercase; color:var(--blue); margin-bottom:2px; }
.card-title { font-size:0.9rem; font-weight:700; color:var(--ink); }
.card-toggle { width:26px; height:26px; border-radius:50%; border:1.5px solid var(--border); display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all 0.2s; }
.card-toggle svg { width:11px; height:11px; fill:none; stroke:var(--ink-soft); stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; transition:transform 0.25s; }
.card.open .card-toggle { background:var(--blue); border-color:var(--blue); }
.card.open .card-toggle svg { stroke:white; transform:rotate(180deg); }
.card-body { display:none; padding:0 18px 18px; border-top:1px solid var(--blue-light); }
.card.open .card-body { display:block; animation:reveal 0.2s ease; }
@keyframes reveal { from{opacity:0;transform:translateY(-5px)} to{opacity:1;transform:translateY(0)} }
.location-pill { display:flex; align-items:flex-start; gap:10px; background:var(--blue-light); border-left:3px solid var(--blue); border-radius:0 8px 8px 0; padding:12px 14px; margin:13px 0; }
.pin { font-size:14px; margin-top:1px; flex-shrink:0; }
.loc-inner { flex:1; }
.loc-label { font-size:9px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; color:var(--blue-dark); margin-bottom:3px; }
.loc-text { font-size:0.845rem; font-weight:500; color:var(--ink); line-height:1.55; }
.tips { list-style:none; }
.tips li { display:flex; align-items:flex-start; gap:10px; padding:8px 0; border-bottom:1px solid var(--blue-light); font-size:0.825rem; line-height:1.55; color:var(--ink-soft); font-weight:400; }
.tips li:last-child { border-bottom:none; }
.tip-num { width:19px; height:19px; border-radius:50%; background:var(--blue); color:white; font-size:9.5px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:2px; }
.notes { font-size:0.825rem; font-weight:400; color:var(--ink-soft); line-height:1.7; margin-top:10px; padding-top:6px; }
.section-photo-wrap { margin-top:14px; border-radius:10px; overflow:hidden; border:1px solid var(--border); background:var(--blue-light); }
.section-photo-wrap img { width:100%; height:200px; object-fit:cover; display:block; }
.section-photo-wrap.placeholder { height:80px; display:flex; align-items:center; justify-content:center; border:1.5px dashed var(--blue-mid); background:var(--blue-light); }
.section-photo-wrap.placeholder span { font-size:0.72rem; font-weight:600; letter-spacing:0.06em; color:var(--blue); opacity:0.7; text-transform:uppercase; text-align:center; padding:0 12px; line-height:1.5; }
.emergency-section { margin-top:28px; }
.emergency-section-title { font-size:9px; font-weight:700; letter-spacing:0.15em; text-transform:uppercase; color:var(--blue); margin-bottom:10px; padding-left:2px; }
.emergency-subsection { margin-bottom:16px; }
.emergency-subsection-title { font-size:0.78rem; font-weight:700; color:var(--ink); margin-bottom:6px; padding-left:2px; }
.contact-item { display:flex; align-items:center; gap:13px; background:var(--white); border:1px solid var(--border); border-radius:10px; padding:14px 16px; margin-bottom:6px; transition:box-shadow 0.2s; }
.contact-item:hover { box-shadow:0 2px 12px rgba(0,100,160,0.08); }
.contact-icon { width:36px; height:36px; border-radius:50%; background:var(--blue-light); display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
.contact-info { flex:1; min-width:0; }
.contact-name { font-size:0.85rem; font-weight:700; color:var(--ink); }
.contact-desc { font-size:0.75rem; color:var(--ink-soft); margin-top:1px; }
.contact-phone { flex-shrink:0; }
.contact-phone a { font-size:0.8rem; font-weight:600; color:var(--blue); text-decoration:none; background:var(--blue-light); padding:6px 12px; border-radius:6px; transition:all 0.15s; }
.contact-phone a:hover { background:var(--blue); color:white; }
footer { text-align:center; padding:24px 24px 40px; font-size:0.75rem; font-weight:500; color:#94B8CC; letter-spacing:0.04em; line-height:1.8; }
footer strong { color:var(--blue-dark); font-weight:700; }
@media(max-width:440px){.header-inner{padding:34px 18px 30px;}.content{padding:18px 12px 60px;}}
    .section-links { margin-top:14px; display:flex; flex-direction:column; gap:8px; }.section-links-label { font-size:9px; font-weight:700; letter-spacing:0.15em; text-transform:uppercase; color:var(--blue); margin-bottom:2px; padding-left:2px; }.section-link { display:flex; align-items:center; gap:10px; background:var(--white); border:1px solid var(--border); border-radius:10px; padding:11px 14px; text-decoration:none; color:var(--ink); font-size:0.85rem; font-weight:600; transition:box-shadow 0.2s, border-color 0.2s; }.section-link:hover { box-shadow:0 2px 12px rgba(0,100,160,0.10); border-color:var(--blue-mid); }.section-link-icon { width:28px; height:28px; border-radius:50%; background:var(--blue-light); display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; color:var(--blue-dark); }.section-link-label { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }.section-link-ext { font-size:11px; color:var(--ink-soft); flex-shrink:0; }.caution-box { display:flex; align-items:flex-start; gap:14px; background:#FFF8E1; border:1px solid #FFD422; border-left:5px solid #E6A800; border-radius:12px; padding:14px 16px; margin-bottom:16px; }.caution-icon { font-size:24px; line-height:1; flex-shrink:0; margin-top:1px; }.caution-text { flex:1; font-size:0.85rem; font-weight:600; color:#5C4500; line-height:1.4; white-space:pre-wrap; }</style></head><body><header class="header"> <div class="header-inner">
 <div class="header-logo"><img src="/logo.png" alt="CityBlock" /></div>
 <div class="header-welcome">Welcome to</div>
 <div class="header-address" id="prop-address">Loading...</div>
 <div class="header-city" id="prop-city"></div>
 <nav class="nav-chips" id="nav-chips"></nav>
 </div></header><div class="header-stripe"></div><main class="content" id="sections-container"></main><footer>Questions? Contact your property manager.<br /><strong id="footer-address"></strong></footer>
<script>
function toggle(h){h.closest('.card').classList.toggle('open');}
function slugify(s){return String(s||'').trim().toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');}
function buildCard(type, prop, tipsForSection){
 var tips=tipsForSection||[];
 var tipsHtml=tips.length?'<ul class="tips">'+tips.map(function(t,i){return'<li><span class="tip-num">'+(i+1)+'</span> '+(t.text||'')+'</li>';}).join('')+'</ul>':'';
 var notesHtml=prop.notes?'<p class="notes">'+prop.notes+'</p>':'';
 var photoHtml=prop.image?'<div class="section-photo-wrap"><img src="'+prop.image+'" alt="'+type.title+'" /></div>':'';
 var extraImages=(prop.images||[]).map(function(it){var u=(it&&it.image)?it.image:(typeof it==='string'?it:'');return u?'<div class="section-photo-wrap"><img src="'+u+'" alt="'+type.title+'" /></div>':'';}).join('');
 var linksHtml=(prop.links||[]).filter(function(l){return l&&l.url;}).map(function(l){var lbl=(l.label&&l.label.trim())||l.url;return '<a class="section-link" href="'+l.url+'" target="_blank" rel="noopener noreferrer"><span class="section-link-icon">&#x1F517;</span><span class="section-link-label">'+lbl+'</span><span class="section-link-ext">&#x2197;</span></a>';}).join('');
 var linksBlock=linksHtml?'<div class="section-links"><div class="section-links-label">Links</div>'+linksHtml+'</div>':'';
 return '<div class="card" id="'+type.id+'">'
 +'<div class="card-header" onclick="toggle(this)">'
 +'<div class="card-icon">'+(type.icon||'ð ')+'</div>'
 +'<div class="card-text"><div class="card-category">'+(type.category||'Property')+'</div><div class="card-title">'+type.title+'</div></div>'
 +'<div class="card-toggle"><svg viewBox="0 0 12 12"><polyline points="2,4 6,8 10,4"></polyline></svg></div>'
 +'</div>'
 +'<div class="card-body"><div class="location-pill"><span class="pin">&#x1F4CD;</span><div class="loc-inner"><div class="loc-label">Location</div><div class="loc-text">'+(prop.location||'Location not set')+'</div></div></div>'
 +tipsHtml+notesHtml+photoHtml+extraImages+linksBlock
 +'</div></div>';
}
function buildEmergencySection(sections, caution){
 if(!sections||!sections.length) return '';
 var html='<div class="emergency-section" id="emergency-contacts">';
 html+='<div class="emergency-section-title">Emergency Contacts</div>';
 if(caution && String(caution).trim()){ html+='<div class="caution-box"><div class="caution-icon">&#x26A0;&#xFE0F;</div><div class="caution-text">'+String(caution)+'</div></div>'; }
 sections.forEach(function(sec){
  html+='<div class="emergency-subsection">';
  if(sec.title) html+='<div class="emergency-subsection-title">'+sec.title+'</div>';
  (sec.contacts||[]).forEach(function(c){
   html+='<div class="contact-item">';
   html+='<div class="contact-icon">&#x1F4DE;</div>';
   html+='<div class="contact-info"><div class="contact-name">'+c.name+'</div>';
   if(c.description) html+='<div class="contact-desc">'+c.description+'</div>';
   html+='</div>';
   if(c.phone) html+='<div class="contact-phone"><a href="tel:'+c.phone+'">'+c.phone+'</a></div>';
   html+='</div>';
  });
  html+='</div>';
 });
 html+='</div>';
 return html;
}
var params=new URLSearchParams(window.location.search);
var id=params.get('id');
if(!id){document.getElementById('prop-address').textContent='No property specified.';}
else{
 Promise.all([
  fetch('/_data/section-types.json').then(function(r){return r.json();}),
  fetch('/_data/properties/'+id+'.json').then(function(r){return r.json();}),
  fetch('/_data/emergency-contacts.json').then(function(r){return r.json();}).catch(function(){return {sections:[]};})
 ]).then(function(results){
  var types=results[0].sections;
  var prop=results[1];
  var emergencyData=results[2];
  document.title=prop.address+' - Property Guide';
  document.getElementById('prop-address').textContent=prop.address||'';
  document.getElementById('prop-city').textContent=prop.city||'';
  document.getElementById('footer-address').textContent=prop.address||'';
  var typeMap={};
  types.forEach(function(t){typeMap[t.id]=t;typeMap[slugify(t.id)]=t;if(t.title)typeMap[slugify(t.title)]=typeMap[slugify(t.title)]||t;});
  var tipsBySection={};
  (prop.tips||[]).forEach(function(tp){var k=slugify(tp.id);if(!tipsBySection[k])tipsBySection[k]=[];tipsBySection[k].push(tp);});
  var container=document.getElementById('sections-container');
  var nav=document.getElementById('nav-chips');
  (prop.sections||[]).forEach(function(ps){
   var rawId=ps.id||'';
   var slug=slugify(rawId);
   var type=typeMap[rawId]||typeMap[slug]||{id:slug||'section',icon:'🏠',category:'Property',title:String(rawId).trim()||'Section'};
   var renderType={id:slug||type.id,icon:type.icon,category:type.category,title:type.title};
   var tipsForSection=tipsBySection[slug]||tipsBySection[rawId]||[];
   container.innerHTML+=buildCard(renderType,ps,tipsForSection);
   nav.innerHTML+='<a href="#'+renderType.id+'">'+renderType.title+'</a>';
  });
  if(emergencyData&&emergencyData.sections&&emergencyData.sections.length){
   container.innerHTML+=buildEmergencySection(emergencyData.sections, emergencyData.caution_statement);
   nav.innerHTML+='<a href="#emergency-contacts">Emergency Contacts</a>';
  }
  nav.querySelectorAll('a').forEach(function(a){
   a.addEventListener('click',function(){
    var t=document.querySelector(a.getAttribute('href'));
    if(t)setTimeout(function(){t.classList.add('open');},180);
   });
  });
 }).catch(function(err){
  document.getElementById('prop-address').textContent='Property not found.';
  console.error(err);
 });
}
</script></body></html>
