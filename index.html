<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Property Guides</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
    :root{--blue:#0088BB;--blue-dark:#005F88;--blue-deeper:#003F5C;--blue-light:#E6F6FC;--accent:#FFD422;--white:#fff;--ink:#0D1F2D;--ink-soft:#3A5568;--border:#D6EDF7;--bg:#F4FAFD;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{font-size:16px;}body{font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100vh;}
    .header{background:var(--blue-deeper);position:relative;overflow:hidden;}
    .header::before{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:rgba(0,140,190,0.18);top:-200px;right:-100px;pointer-events:none;}
    .header-inner{position:relative;max-width:680px;margin:0 auto;padding:48px 28px 44px;}
    .header-logo{margin-bottom:22px;}
    .header-logo img{height:38px;width:auto;display:block;mix-blend-mode:screen;filter:brightness(1.05);}
    .header-eyebrow{font-size:10px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;}
    .header-title{font-size:clamp(1.4rem,5vw,2rem);font-weight:800;color:var(--white);line-height:1.15;}
    .header-subtitle{font-size:0.85rem;color:rgba(255,255,255,0.45);margin-top:6px;}
    .header-stripe{height:3px;background:linear-gradient(90deg,var(--blue) 0%,rgba(179,223,240,0.6) 55%,transparent 100%);}
    .content{max-width:680px;margin:0 auto;padding:32px 20px 80px;}
    .section-title{font-size:0.7rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--blue);margin-bottom:14px;}
    .property-grid{display:flex;flex-direction:column;gap:8px;}
    .property-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:18px 20px;text-decoration:none;color:var(--ink);display:flex;align-items:center;justify-content:space-between;transition:box-shadow 0.2s,border-color 0.2s;}
    .property-card:hover{box-shadow:0 4px 18px rgba(0,100,160,0.09);border-color:var(--blue);}
    .prop-icon{width:40px;height:40px;border-radius:10px;background:var(--blue-light);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;margin-right:14px;}
    .prop-info{flex:1;}
    .prop-address{font-size:0.9rem;font-weight:700;color:var(--ink);}
    .prop-city{font-size:0.78rem;font-weight:400;color:var(--ink-soft);margin-top:2px;}
    .prop-url{font-size:0.7rem;font-weight:600;letter-spacing:0.05em;color:var(--blue);margin-top:4px;text-transform:uppercase;}
    .prop-arrow{font-size:1.1rem;color:var(--blue);flex-shrink:0;}
    .empty{color:var(--ink-soft);font-size:0.85rem;text-align:center;padding:40px 0;}
    footer{text-align:center;padding:24px;font-size:0.75rem;color:#94B8CC;}
    </style>
</head>
<body>
<header class="header">
    <div class="header-inner">
        <div class="header-logo"><img src="/logo.png" alt="CityBlock" /></div>
        <div class="header-eyebrow">CityBlock Property Management</div>
        <div class="header-title">Property Guides</div>
        <div class="header-subtitle">Select a property to view its guide</div>
    </div>
</header>
<div class="header-stripe"></div>
<main class="content">
    <div class="section-title">All Properties</div>
    <div class="property-grid" id="property-grid"><div class="empty">Loading properties...</div></div>
</main>
<footer>CityBlock Property Management</footer>
<script>
fetch('/_data/properties-list.json')
    .then(function(r){return r.json();})
    .then(function(data){
        var grid=document.getElementById('property-grid');
        var props=data.properties||[];
        if(!props.length){grid.innerHTML='<div class="empty">No properties found.</div>';return;}
        grid.innerHTML=props.map(function(p){
            var url='/property/?id='+p.slug;
            return '<a class="property-card" href="'+url+'">'
                +'<div class="prop-icon">🏠</div>'
                +'<div class="prop-info">'
                +'<div class="prop-address">'+p.address+'</div>'
                +'<div class="prop-city">'+p.city+'</div>'
                +'<div class="prop-url">'+url+'</div>'
                +'</div>'
                +'<div class="prop-arrow">›</div>'
                +'</a>';
        }).join('');
    })
    .catch(function(){document.getElementById('property-grid').innerHTML='<div class="empty">Could not load properties.</div>';});
</script>
</body>
</html>
