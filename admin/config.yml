backend:
  name: git-gateway
  branch: main
media_folder: "uploads"
public_folder: "/uploads"
collections:
  - name: "property"
    label: "Property Guide"
    files:
      - name: "site"
        label: "Site Settings (Address)"
        file: "_data/site.json"
        fields:
          - { label: "Property Address", name: "address", widget: "string" }
          - { label: "City, State ZIP", name: "city", widget: "string" }

      - name: "sections"
        label: "Sections"
        file: "_data/sections.json"
        fields:
          - label: "Sections"
            name: "sections"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Section ID (no spaces, e.g. smoke)", name: "id", widget: "string" }
              - { label: "Emoji Icon", name: "icon", widget: "string", default: "🏠" }
              - { label: "Category Label", name: "category", widget: "string", default: "General" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Location Description", name: "location", widget: "text" }
              - label: "Tips"
                name: "tips"
                widget: "list"
                required: false
                field: { label: "Tip", name: "tip", widget: "string" }
              - { label: "Notes", name: "notes", widget: "text", required: false }
              - { label: "Photo", name: "image", widget: "image", required: false }
