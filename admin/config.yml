backend:
  name: git-gateway
  branch: main

media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "property"
    label: "Property Guide"
    files:
      - name: "site"
        label: "Site Settings"
        file: "_data/site.json"
        fields:
          - { label: "Property Address", name: "address", widget: "string" }
          - { label: "City, State ZIP", name: "city", widget: "string" }

  - name: "sections"
    label: "Guide Sections"
    folder: "_sections"
    create: true
    slug: "{{slug}}"
    identifier_field: "title"
    fields:
      - { label: "Section ID", name: "id", widget: "string", hint: "Unique ID, e.g. smoke, water-heater" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Category", name: "category", widget: "string", hint: "e.g. Safety, Utilities, Emergency" }
      - { label: "Icon Emoji", name: "icon", widget: "string", hint: "e.g. 🔥 💧 ⚡" }
      - { label: "Location Description", name: "location", widget: "text" }
      - label: "Tips"
        name: "tips"
        widget: "list"
        required: false
        field: { label: "Tip", name: "tip", widget: "string" }
      - { label: "Notes", name: "notes", widget: "text", required: false }
      - { label: "Photo", name: "photo", widget: "image", required: false }
