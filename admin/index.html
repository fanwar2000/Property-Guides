<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Property Guide CMS</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
      #nc-root img[class] { max-height: 80px; }
    </style>
</head>
<body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
    (function waitForLogo() {
      var svg = document.querySelector('#nc-root svg');
      if (!svg) return setTimeout(waitForLogo, 200);
      var wrapper = svg.parentElement;
      wrapper.innerHTML = '<img src="/logo.png" alt="CityBlock" style="height:80px;width:auto;" />';
    })();
    </script>
</body>
</html>
