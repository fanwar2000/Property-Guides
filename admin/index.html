<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Property Guide CMS</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
      .custom-logo-wrap { text-align: center; padding: 40px 0 20px; }
      .custom-logo-wrap img { height: 60px; width: auto; }
    </style>
</head>
<body>
    <div class="custom-logo-wrap"><img src="/logo.png" alt="CityBlock" /></div>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
    var observer = new MutationObserver(function() {
      var el = document.querySelector('#nc-root svg, #nc-root img[src*="data:"]');
      if (el) {
        var container = el.closest('div');
        while (container && container.id !== 'nc-root') {
          if (container.querySelector('button')) {
            container.querySelectorAll('svg, span, img[src*="data:"]').forEach(function(x) { x.style.display = 'none'; });
            observer.disconnect();
            break;
          }
          container = container.parentElement;
        }
      }
    });
    observer.observe(document.body, { childList: true, subtree: true });
    </script>
</body>
</html>
